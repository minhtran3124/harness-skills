name: harness-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # The hooks are bash developed on macOS and run on contributors' Linux machines —
      # the BSD/GNU split is exactly what this matrix exists to catch.
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Run harness test suite
        run: bash scripts/run-tests.sh

  # Strict-in-CI gate: a PR diff that touches hard-gate paths must carry a
  # high-risk SUMMARY with machine-verified proof. Separate job (not a step in
  # `test`) because it needs full history (fetch-depth: 0) to diff against the
  # base branch. Local commit hooks keep their warn-default; CI is the strict gate.
  strict-gate:
    name: strict-gate (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base ref
        run: git fetch --no-tags origin "${{ github.base_ref }}"
      - name: Strict gate (hard-gate paths require high-risk SUMMARY + verified proof)
        run: bash scripts/ci-strict-gate.sh "origin/${{ github.base_ref }}"
