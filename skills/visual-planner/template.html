<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}} · plan</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #6366f1;
      --accent-soft: #eef2ff;
      --code-bg: #f6f8fa;
      --card-bg: #ffffff;
      --shadow: 0 1px 2px rgba(17, 24, 39, 0.04);
      --shadow-hover: 0 6px 16px rgba(17, 24, 39, 0.08);
      --status-proposed-fg: #475569;
      --status-proposed-bg: #f1f5f9;
      --status-active-fg: #4338ca;
      --status-active-bg: #eef2ff;
      --status-paused-fg: #92400e;
      --status-paused-bg: #fef3c7;
      --status-shipped-fg: #065f46;
      --status-shipped-bg: #d1fae5;
      --risk-high-fg: #b91c1c;
      --risk-high-bg: #fee2e2;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0d12;
        --fg: #e5e7eb;
        --muted: #9ca3af;
        --border: #1f2937;
        --accent: #818cf8;
        --accent-soft: #1e1b4b;
        --code-bg: #0d1117;
        --card-bg: #11141b;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-hover: 0 6px 18px rgba(0, 0, 0, 0.5);
        --status-proposed-fg: #cbd5e1;
        --status-proposed-bg: #1f2937;
        --status-active-fg: #c7d2fe;
        --status-active-bg: #312e81;
        --status-paused-fg: #fde68a;
        --status-paused-bg: #422006;
        --status-shipped-fg: #a7f3d0;
        --status-shipped-bg: #064e3b;
        --risk-high-fg: #fca5a5;
        --risk-high-bg: #450a0a;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, var(--accent-soft) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 0%, color-mix(in oklab, var(--accent) 12%, transparent) 0%, transparent 70%);
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
    /* Animations — subtle entry cascade + progress fill; respects reduced motion */
    @keyframes fade-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes progress-grow { from { width: 0; } }
    main > * { animation: fade-up 0.45s ease both; }
    main > *:nth-child(1) { animation-delay: 0.0s; }
    main > *:nth-child(2) { animation-delay: 0.06s; }
    main > *:nth-child(3) { animation-delay: 0.12s; }
    main > *:nth-child(4) { animation-delay: 0.18s; }
    main > *:nth-child(5) { animation-delay: 0.24s; }
    main > *:nth-child(6) { animation-delay: 0.3s; }
    @media (prefers-reduced-motion: reduce) {
      main > *, .progress-fill, .task-card, .task-node { animation: none !important; transition: none !important; }
    }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr); gap: 32px; padding: 32px 24px; max-width: 1200px; margin: 0 auto; }
    @media (min-width: 1024px) { .layout { grid-template-columns: minmax(0, 880px) 220px; } }
    main { min-width: 0; }
    h1, h2, h3, h4 { line-height: 1.25; font-weight: 650; letter-spacing: -0.01em; }
    h1 {
      font-size: 2.4rem; margin: 0 0 12px; letter-spacing: -0.025em;
      background: linear-gradient(120deg, var(--fg) 0%, var(--accent) 70%, var(--status-shipped-fg) 110%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
    }
    h2 { font-size: 1.35rem; margin: 32px 0 12px; padding-top: 8px; border-top: 1px solid var(--border); }
    h3 { font-size: 1.05rem; margin: 24px 0 8px; }
    p { margin: 12px 0; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; font-size: 0.9em; background: var(--code-bg); padding: 2px 5px; border-radius: 4px; }
    pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; overflow-x: auto; font-size: 0.88rem; line-height: 1.5; }
    pre code { background: transparent; padding: 0; border-radius: 0; }
    table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 0.95rem; }
    th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { font-weight: 600; color: var(--muted); }
    ul, ol { padding-left: 22px; }
    li { margin: 4px 0; }
    hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }

    .header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px 18px; margin-bottom: 8px; }
    .meta { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 18px; color: var(--muted); font-size: 0.92rem; margin-bottom: 4px; }
    .meta span { display: inline-flex; align-items: center; gap: 6px; }
    .source-links { display: inline-flex; flex-wrap: wrap; gap: 8px; margin-left: auto; }
    .source-link { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border: 1px solid var(--border); border-radius: 999px; color: var(--muted); font-family: ui-monospace, SFMono-Regular, monospace; font-size: 0.78rem; transition: color .15s, border-color .15s, background .15s; }
    .source-link:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); text-decoration: none; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; }
    .badge[data-status="proposed"] { color: var(--status-proposed-fg); background: var(--status-proposed-bg); }
    .badge[data-status="active"]   { color: var(--status-active-fg);   background: var(--status-active-bg); }
    .badge[data-status="paused"]   { color: var(--status-paused-fg);   background: var(--status-paused-bg); }
    .badge[data-status="shipped"]  { color: var(--status-shipped-fg);  background: var(--status-shipped-bg); }

    .intro-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; margin: 18px 0 8px; box-shadow: var(--shadow); }
    .intro-card dl { margin: 0; display: grid; grid-template-columns: max-content 1fr; gap: 16px 18px; align-items: start; }
    .intro-card dt { color: var(--muted); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; padding-top: 2px; }
    .intro-card dd { margin: 0; min-width: 0; }
    .intro-card dd > p { margin: 0; }
    .intro-card .intro-list { margin: 0; padding-left: 18px; }
    .intro-card .intro-list li { margin: 4px 0; padding-left: 2px; }
    .intro-card .intro-list li:first-child { margin-top: 0; }
    .intro-card .intro-list li::marker { color: var(--accent); }
    .intro-card .tech-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .intro-card .tech-chip { display: inline-flex; align-items: center; font-size: 0.85rem; line-height: 1.4; background: var(--accent-soft); color: var(--fg); border: 1px solid color-mix(in oklab, var(--accent) 25%, var(--border)); padding: 3px 11px; border-radius: 999px; }
    .intro-card .tech-chip code { background: transparent; padding: 0; font-size: 0.85em; }

    /* Architecture -> "scope of change" map: count dashboard + verb-tagged rows */
    .change-map { display: flex; flex-direction: column; gap: 10px; }
    .change-summary { display: flex; flex-wrap: wrap; gap: 6px; }
    .change-tag { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 2px 9px; border-radius: 999px; font-variant-numeric: tabular-nums; }
    .change-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
    .change-list li { display: grid; grid-template-columns: 64px minmax(0, 1fr); gap: 10px; align-items: start; padding: 8px 11px; border: 1px solid var(--border); border-left: 3px solid var(--border); border-radius: 8px; background: transparent; transition: background .15s, border-color .15s; }
    .change-list li:hover { background: color-mix(in oklab, var(--accent-soft) 50%, transparent); }
    .act-badge { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; text-align: center; padding: 3px 4px; border-radius: 5px; line-height: 1.35; }
    .act-text { min-width: 0; align-self: center; }
    .change-list li[data-act="add"]     { border-left-color: var(--status-shipped-fg); }
    .change-list li[data-act="change"]  { border-left-color: var(--status-paused-fg); }
    .change-list li[data-act="keep"]    { border-left-color: var(--status-active-fg); }
    .change-list li[data-act="remove"]  { border-left-color: var(--risk-high-fg); }
    .change-list li[data-act="exclude"] { border-left-color: var(--status-proposed-fg); }
    [data-act="add"].act-badge,     [data-act="add"].change-tag     { color: var(--status-shipped-fg);  background: var(--status-shipped-bg); }
    [data-act="change"].act-badge,  [data-act="change"].change-tag  { color: var(--status-paused-fg);   background: var(--status-paused-bg); }
    [data-act="keep"].act-badge,    [data-act="keep"].change-tag    { color: var(--status-active-fg);    background: var(--status-active-bg); }
    [data-act="remove"].act-badge,  [data-act="remove"].change-tag  { color: var(--risk-high-fg);        background: var(--risk-high-bg); }
    [data-act="exclude"].act-badge, [data-act="exclude"].change-tag { color: var(--status-proposed-fg);  background: var(--status-proposed-bg); }
    [data-act="note"].act-badge { color: var(--muted); background: transparent; font-size: 0.9rem; }

    /* Motivation -> callout (the "why") */
    .callout { border-left: 3px solid var(--accent); background: color-mix(in oklab, var(--accent-soft) 60%, transparent); border-radius: 0 10px 10px 0; padding: 12px 16px; margin: 14px 0; }
    .callout > :first-child { margin-top: 0; }
    .callout > :last-child { margin-bottom: 0; }

    /* Risks -> severity-coded register cards (RAG) */
    .risk-grid { display: flex; flex-direction: column; gap: 10px; margin: 12px 0; }
    .risk-card { border: 1px solid var(--border); border-left: 3px solid var(--muted); border-radius: 10px; padding: 11px 14px; background: var(--card-bg); box-shadow: var(--shadow); transition: box-shadow .2s, transform .2s; }
    .risk-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
    .risk-card[data-sev="high"]   { border-left-color: var(--risk-high-fg); }
    .risk-card[data-sev="medium"] { border-left-color: var(--status-paused-fg); }
    .risk-card[data-sev="low"]    { border-left-color: var(--status-shipped-fg); }
    .risk-head { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .risk-title { font-weight: 650; }
    .risk-sev { margin-left: auto; flex: none; font-size: 0.64rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 2px 9px; border-radius: 999px; }
    .risk-sev[data-sev="high"]   { color: var(--risk-high-fg);      background: var(--risk-high-bg); }
    .risk-sev[data-sev="medium"] { color: var(--status-paused-fg);  background: var(--status-paused-bg); }
    .risk-sev[data-sev="low"]    { color: var(--status-shipped-fg); background: var(--status-shipped-bg); }
    .risk-body { color: var(--fg); }
    .risk-mit { margin-top: 6px; font-size: 0.92rem; color: var(--muted); }
    .risk-mit-label { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--status-shipped-fg); background: var(--status-shipped-bg); padding: 1px 7px; border-radius: 5px; margin-right: 6px; }

    /* Success criteria -> acceptance checklist (Definition of Done) */
    .check-list { list-style: none; padding: 0; margin: 12px 0; display: flex; flex-direction: column; gap: 7px; }
    .check-item { display: grid; grid-template-columns: 18px minmax(0, 1fr); gap: 10px; align-items: start; }
    .check-box { width: 15px; height: 15px; margin-top: 4px; border: 2px solid var(--accent); border-radius: 4px; flex: none; }
    .then-arrow { color: var(--accent); font-weight: 700; padding: 0 3px; }

    /* Non-goals -> out-of-scope list (matches change-map "exclude") */
    .scope-out { list-style: none; padding: 0; margin: 12px 0; display: flex; flex-direction: column; gap: 6px; }
    .scope-out li { display: grid; grid-template-columns: 18px minmax(0, 1fr); gap: 8px; align-items: start; color: var(--muted); }
    .scope-out .scope-mark { color: var(--status-proposed-fg); font-weight: 700; line-height: 1.5; }
    @media (max-width: 640px) {
      .intro-card dl { grid-template-columns: 1fr; gap: 4px 0; }
      .intro-card dt { margin-top: 10px; }
      .intro-card dt:first-child { margin-top: 0; }
    }

    .wave-strip { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0 8px; }
    .wave-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; border: 1px solid var(--border); background: var(--card-bg); color: var(--fg); font-size: 0.88rem; transition: background .15s, border-color .15s; }
    .wave-pill:hover { background: var(--accent-soft); border-color: var(--accent); text-decoration: none; }
    .wave-pill .count { color: var(--muted); }
    .wave-pill .parallel { color: var(--accent); font-weight: 600; }

    .tasks-toolbar { display: flex; gap: 8px; margin: 8px 0 12px; }
    .toolbar-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--fg); padding: 4px 10px; border-radius: 6px; font: inherit; font-size: 0.85rem; cursor: pointer; }
    .toolbar-btn:hover { background: var(--accent-soft); border-color: var(--accent); }

    section[data-wave] { margin: 18px 0 24px; }
    section[data-wave] > h3 { color: var(--muted); font-weight: 600; margin: 8px 0 10px; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.04em; }

    .task-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); margin: 10px 0; transition: box-shadow .2s ease, transform .2s ease, border-color .2s ease; }
    .task-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); border-color: color-mix(in oklab, var(--accent) 35%, var(--border)); }
    .task-card:target { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-hover); }
    .task-card-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; user-select: none; }
    .task-card-header .id { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 0.85rem; padding: 2px 8px; border-radius: 6px; background: var(--accent-soft); color: var(--accent); font-weight: 600; }
    .task-card-header .title { flex: 1; min-width: 0; font-weight: 600; }
    .task-card-header .chev { color: var(--muted); transition: transform .2s; }
    .task-card[data-collapsed="true"] .task-card-header .chev { transform: rotate(-90deg); }
    .task-card[data-collapsed="true"] .task-card-body { display: none; }
    .task-card-body { padding: 0 16px 16px 16px; border-top: 1px solid var(--border); }
    .task-block { margin: 12px 0; }
    .task-block-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
    .file-chip { display: inline-block; font-family: ui-monospace, SFMono-Regular, monospace; font-size: 0.82rem; background: var(--code-bg); border: 1px solid var(--border); padding: 2px 8px; border-radius: 6px; margin: 2px 4px 2px 0; }
    .verify-block { position: relative; }
    .copy-btn { position: absolute; top: 8px; right: 8px; background: var(--card-bg); border: 1px solid var(--border); color: var(--muted); padding: 2px 8px; border-radius: 5px; font: inherit; font-size: 0.78rem; cursor: pointer; }
    .copy-btn:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
    .copy-btn[data-copied="true"] { color: var(--status-shipped-fg); border-color: var(--status-shipped-fg); }

    .subtasks { margin-top: 10px; padding-left: 14px; border-left: 2px solid var(--border); }
    .subtasks .task-card { margin: 8px 0; }

    .empty-state { text-align: center; color: var(--muted); padding: 32px 16px; border: 1px dashed var(--border); border-radius: 12px; }

    /* Stats card — derived: tasks count, waves count, unique files, parallel waves, optional progress strip */
    .stats-card { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); margin: 18px 0; overflow: hidden; }
    .stat { padding: 14px 18px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 2px; }
    .stat:last-child { border-right: 0; }
    .stat-num { font-size: 2rem; font-weight: 700; letter-spacing: -0.025em; line-height: 1; color: var(--fg); font-variant-numeric: tabular-nums; }
    .stat:hover .stat-num { color: var(--accent); }
    .stat { transition: background .15s; }
    .stat:hover { background: color-mix(in oklab, var(--accent-soft) 60%, transparent); }
    .stat-lbl { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
    .stat-progress { grid-column: 1 / -1; padding: 12px 18px; border-top: 1px solid var(--border); }
    .progress-row { display: flex; align-items: center; gap: 12px; }
    .progress-label { font-size: 0.85rem; color: var(--muted); white-space: nowrap; }
    .progress-track { flex: 1; height: 8px; background: var(--code-bg); border-radius: 999px; overflow: hidden; border: 1px solid var(--border); }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--status-shipped-fg)); transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1); animation: progress-grow 1s cubic-bezier(0.22, 1, 0.36, 1); }
    .progress-pct { font-size: 0.85rem; font-variant-numeric: tabular-nums; color: var(--fg); font-weight: 600; min-width: 4ch; text-align: right; }

    /* Wave-flow SVG — replaces a flat pill strip with a 2-D flow diagram */
    .wave-flow { margin: 18px 0; overflow-x: auto; padding-bottom: 4px; }
    .wave-flow svg { display: block; min-width: 100%; }
    .wave-flow .wave-col-bg { fill: var(--accent-soft); opacity: 0.5; }
    .wave-flow .wave-label { fill: var(--accent); font-weight: 700; font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; font-family: system-ui, sans-serif; }
    .wave-flow .wave-meta { fill: var(--muted); font-size: 11px; font-family: system-ui, sans-serif; }
    .wave-flow .task-node { fill: var(--card-bg); stroke: var(--border); stroke-width: 1; cursor: pointer; transition: stroke 0.2s, fill 0.2s, stroke-width 0.2s, transform 0.2s; transform-box: fill-box; transform-origin: center; }
    .wave-flow a:hover .task-node { stroke: var(--accent); fill: var(--accent-soft); stroke-width: 2; transform: scale(1.04); }
    .wave-flow a:hover .task-id { fill: var(--accent); }
    .wave-flow .task-id { fill: var(--fg); font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px; font-weight: 600; pointer-events: none; }
    .wave-flow .arrow { stroke: var(--muted); stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .wave-flow .arrowhead { fill: var(--muted); }

    /* Status timeline — replaces prose render of "Status Log" section */
    .timeline { position: relative; margin: 18px 0; padding-left: 24px; }
    .timeline::before { content: ""; position: absolute; left: 7px; top: 6px; bottom: 6px; width: 2px; background: var(--border); }
    .timeline-entry { position: relative; padding: 10px 0; transition: padding-left .15s; }
    .timeline-entry:hover { padding-left: 4px; }
    .timeline-entry::before { content: ""; position: absolute; left: -22px; top: 16px; width: 12px; height: 12px; border-radius: 999px; background: var(--card-bg); border: 2px solid var(--muted); box-shadow: 0 0 0 3px var(--bg); transition: transform .2s ease; }
    .timeline-entry:hover::before { transform: scale(1.25); }
    /* kind-coloured dots: build=green decision=blue plan=indigo open=amber */
    .timeline-entry[data-kind="build"]::before    { border-color: var(--status-shipped-fg); background: var(--status-shipped-fg); }
    .timeline-entry[data-kind="decision"]::before { border-color: var(--status-active-fg);  background: var(--status-active-fg); }
    .timeline-entry[data-kind="plan"]::before     { border-color: var(--accent);            background: var(--accent); }
    .timeline-entry[data-kind="open"]::before     { border-color: var(--status-paused-fg);  background: var(--status-paused-fg); }
    .timeline-entry .t-meta { display: flex; flex-wrap: wrap; gap: 6px 12px; align-items: baseline; font-size: 0.88rem; }
    .timeline-entry .t-date { color: var(--muted); font-variant-numeric: tabular-nums; }
    .t-kind { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 1px 8px; border-radius: 999px; }
    .t-kind[data-kind="build"]    { color: var(--status-shipped-fg); background: var(--status-shipped-bg); }
    .t-kind[data-kind="decision"] { color: var(--status-active-fg);  background: var(--status-active-bg); }
    .t-kind[data-kind="plan"]     { color: var(--accent);            background: var(--accent-soft); }
    .t-kind[data-kind="open"]     { color: var(--status-paused-fg);  background: var(--status-paused-bg); }
    .t-kind[data-kind="note"]     { color: var(--muted);             background: var(--code-bg); }
    .timeline-entry .t-note { color: var(--fg); margin-top: 2px; }
    .timeline-entry .t-subs { margin: 6px 0 0; padding-left: 18px; font-size: 0.92rem; color: var(--muted); }
    .timeline-entry .t-subs li { margin: 2px 0; }
    .timeline-fold { margin: 0; }
    .timeline-fold > summary { cursor: pointer; color: var(--accent); font-size: 0.85rem; padding: 6px 0; list-style: none; user-select: none; }
    .timeline-fold > summary::-webkit-details-marker { display: none; }
    .timeline-fold > summary::before { content: "▸ "; }
    .timeline-fold[open] > summary::before { content: "▾ "; }
    .timeline-empty { color: var(--muted); font-style: italic; padding: 8px 0; }

    /* Plan Review (--review mode: graph-derived blast radius + risk) */
    .file-status { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 0.74rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; }
    .file-status[data-status="new"] { color: var(--status-active-fg); background: var(--status-active-bg); }
    .file-status[data-status="existing"] { color: var(--status-proposed-fg); background: var(--status-proposed-bg); }
    .file-status[data-status="missing"] { color: var(--risk-high-fg); background: var(--risk-high-bg); }
    .risk-chip { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 0.74rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
    .risk-chip[data-risk="high"] { color: var(--risk-high-fg); background: var(--risk-high-bg); }
    .risk-chip[data-risk="medium"] { color: var(--status-paused-fg); background: var(--status-paused-bg); }
    .risk-chip[data-risk="low"] { color: var(--status-shipped-fg); background: var(--status-shipped-bg); }
    .review-table td code { font-size: 0.82rem; }
    .review-grid { display: grid; gap: 12px; margin: 16px 0; }
    .review-card { background: var(--card-bg); border: 1px solid var(--border); border-left: 3px solid var(--risk-high-fg); border-radius: 10px; padding: 12px 16px; box-shadow: var(--shadow); }
    .review-card-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
    .review-warn { color: var(--status-paused-fg); background: var(--status-paused-bg); border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; margin: 12px 0; }
    .review-muted { color: var(--muted); font-size: 0.85rem; }

    aside.toc { display: none; }
    @media (min-width: 1024px) {
      aside.toc { display: block; position: sticky; top: 32px; align-self: start; font-size: 0.9rem; max-height: calc(100vh - 64px); overflow-y: auto; }
      aside.toc ul { list-style: none; padding: 0; margin: 0; }
      aside.toc li { margin: 4px 0; }
      aside.toc a { color: var(--muted); display: block; padding: 4px 8px; border-left: 2px solid transparent; border-radius: 0 4px 4px 0; }
      aside.toc a:hover { color: var(--fg); background: var(--accent-soft); text-decoration: none; }
      aside.toc a.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-soft); font-weight: 600; }
    }

    @media (max-width: 640px) {
      .layout { padding: 16px 12px; gap: 16px; }
      h1 { font-size: 1.6rem; }
      .wave-pill { font-size: 0.82rem; padding: 5px 10px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <main>
      <header class="header">
        <h1>{{TITLE}}</h1>
        {{STATUS_BADGE}}
      </header>
      <div class="meta">
        <span>👤 {{OWNER}}</span>
        <span>📅 {{CREATED}}</span>
        <span>🔖 {{SLUG}}</span>
        <span class="source-links">{{SOURCE_LINKS}}</span>
      </div>

      {{STATS}}

      {{INTRO_CARD}}

      <nav class="wave-flow" aria-label="Wave flow">
        {{WAVE_DIAGRAM}}
      </nav>

      {{SECTIONS}}

      {{REVIEW}}

      <h2 id="tasks">Tasks</h2>
      <div class="tasks-toolbar">
        <button type="button" class="toolbar-btn" data-action="expand-all">Expand all</button>
        <button type="button" class="toolbar-btn" data-action="collapse-all">Collapse all</button>
      </div>

      {{TASKS}}

    </main>
    <aside class="toc" aria-label="Table of contents">
      {{TOC}}
    </aside>
  </div>

  <script>
    (() => {
      // Collapse / expand individual task cards
      document.querySelectorAll('.task-card-header').forEach((h) => {
        h.addEventListener('click', () => {
          const card = h.closest('.task-card');
          if (!card) return;
          const collapsed = card.getAttribute('data-collapsed') === 'true';
          card.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
        });
      });

      // Expand all / Collapse all toolbar buttons
      document.querySelectorAll('.toolbar-btn').forEach((b) => {
        b.addEventListener('click', () => {
          const action = b.getAttribute('data-action');
          const next = action === 'collapse-all' ? 'true' : 'false';
          document.querySelectorAll('.task-card').forEach((c) => c.setAttribute('data-collapsed', next));
        });
      });

      // Copy <verify> command — clipboard API with execCommand fallback (Firefox file://)
      document.querySelectorAll('.copy-btn').forEach((btn) => {
        btn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          const target = btn.closest('.verify-block')?.querySelector('pre code, pre');
          if (!target) return;
          const text = target.innerText;
          const flash = () => {
            btn.setAttribute('data-copied', 'true');
            btn.textContent = 'Copied';
            setTimeout(() => { btn.removeAttribute('data-copied'); btn.textContent = 'Copy'; }, 1200);
          };
          const fallback = () => {
            const ta = document.createElement('textarea');
            ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
            document.body.appendChild(ta); ta.select();
            try { document.execCommand('copy'); flash(); } finally { document.body.removeChild(ta); }
          };
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(flash, fallback);
          } else {
            fallback();
          }
        });
      });

      // Smooth scroll for wave pills + TOC
      document.querySelectorAll('a[href^="#"]').forEach((a) => {
        a.addEventListener('click', (ev) => {
          const id = a.getAttribute('href').slice(1);
          const el = document.getElementById(id);
          if (!el) return;
          ev.preventDefault();
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          history.replaceState(null, '', '#' + id);
        });
      });

      // TOC active-link tracking via IntersectionObserver
      const tocLinks = new Map();
      document.querySelectorAll('aside.toc a[href^="#"]').forEach((a) => tocLinks.set(a.getAttribute('href').slice(1), a));
      if (tocLinks.size > 0 && 'IntersectionObserver' in window) {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              tocLinks.forEach((link) => link.classList.remove('active'));
              const link = tocLinks.get(e.target.id);
              if (link) link.classList.add('active');
            }
          });
        }, { rootMargin: '-20% 0px -70% 0px', threshold: 0 });
        tocLinks.forEach((_, id) => {
          const el = document.getElementById(id);
          if (el) observer.observe(el);
        });
      }
    })();
  </script>
</body>
</html>
